name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Docs-sync reminder: any feature/rule/module/data change should update
      # README.md, CLAUDE.md, and (for non-trivial calls) DECISIONS.md in the
      # same PR. This is a checklist prompt, not an enforced gate.
